    <circle cx="50" cy="50" r="46"/>
  </clipPath>
  <g clip-path="url(#circle-clip)">
    <!-- Red and Black stripes in the background -->
    <rect x="0" y="0" width="20" height="100" fill="#DA291C"/>
    <rect x="20" y="0" width="20" height="100" fill="#000000"/>
    <rect x="40" y="0" width="20" height="100" fill="#DA291C"/>
    <rect x="60" y="0" width="20" height="100" fill="#000000"/>
    <rect x="80" y="0" width="20" height="100" fill="#DA291C"/>
    <!-- Silhouette of player heading a ball (simplified gold emblem) -->
    <path d="M 65 35 C 65 25 80 35 70 45 C 65 40 60 45 55 42" fill="none" stroke="#F1C40F" stroke-width="3"/>
    <circle cx="75" cy="25" r="5" fill="#F1C40F"/>
    <!-- AFCB text -->
    <rect x="20" y="70" width="60" height="15" fill="#000000" rx="3" stroke="#F1C40F" stroke-width="1"/>
    <text x="50" y="81" font-family="Sora, sans-serif" font-weight="800" font-size="8" fill="#F1C40F" text-anchor="middle">AFCB</text>
