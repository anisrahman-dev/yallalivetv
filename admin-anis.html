<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>Admin – Yalla Live</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0f172a',
              surface: '#1e293b',
              primary: '#ee335f',
              accent: '#fac912'
            },
            fontFamily: { sora: ['Sora', 'sans-serif'] }
          }
        }
      };
    </script>
    <style>
      body { font-family: 'Sora', sans-serif; }
      .field-label { @apply block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1; }
      input, select, textarea { font-family: 'Sora', sans-serif; }
      .toast { transition: opacity .25s ease, transform .25s ease; }
    </style>
  </head>
  <body class="bg-background text-slate-100 min-h-screen">
    <!-- ════════════════════ AUTH GATE ════════════════════ -->
    <section id="auth-gate" class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-sm bg-surface border border-slate-700/50 rounded-2xl shadow-2xl p-8">
        <div class="flex items-center justify-center mb-6">
          <img src="logos/logo-unified.png" alt="Yalla Live" class="h-12 w-auto object-contain" />
        </div>
        <h1 class="text-xl font-extrabold text-center mb-1">Admin Console</h1>
        <p class="text-xs text-slate-400 text-center mb-6">Enter password to continue</p>
        <form id="auth-form" class="space-y-4">
          <input
            id="auth-password"
            type="password"
            autocomplete="current-password"
            placeholder="Password"
            class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
            required
          />
          <button type="submit" class="w-full bg-primary hover:bg-primary/90 active:scale-[0.98] text-white font-bold rounded-xl py-3 text-sm uppercase tracking-wider transition-all">
            Sign In
          </button>
          <p id="auth-error" class="text-[11px] text-red-400 text-center hidden">Wrong password</p>
        </form>
      </div>
    </section>

    <!-- ════════════════════ ADMIN UI ════════════════════ -->
    <section id="admin-ui" class="hidden">
      <!-- Header -->
      <header class="sticky top-0 z-40 bg-surface/95 backdrop-blur border-b border-slate-700/50">
        <div class="max-w-[1100px] mx-auto px-4 py-3 flex items-center justify-between gap-3 flex-wrap">
          <div class="flex items-center gap-2">
            <img src="logos/logo-unified.png" alt="" class="h-9 w-auto" />
            <span class="text-xs font-extrabold uppercase tracking-widest text-primary">Admin</span>
          </div>
          <div class="flex items-center gap-2">
            <span id="dirty-indicator" class="hidden text-[10px] font-bold uppercase tracking-wider text-accent">● Unsaved</span>
            <button id="btn-reload" class="text-xs font-bold uppercase tracking-wider px-3 py-2 rounded-xl bg-slate-700/60 hover:bg-slate-700 transition">Reload from GitHub</button>
            <button id="btn-publish" class="text-xs font-bold uppercase tracking-wider px-4 py-2 rounded-xl bg-primary hover:bg-primary/90 transition flex items-center gap-1.5">
              <span class="material-symbols-outlined text-base">cloud_upload</span>
              Publish
            </button>
            <button id="btn-logout" class="text-xs font-bold uppercase tracking-wider px-3 py-2 rounded-xl bg-slate-700/40 hover:bg-slate-700 transition" title="Sign out">
              <span class="material-symbols-outlined text-base align-middle">logout</span>
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-[1100px] mx-auto px-4 py-6 space-y-6">
        <!-- GitHub Settings Panel -->
        <details class="bg-surface border border-slate-700/50 rounded-2xl overflow-hidden">
          <summary class="cursor-pointer select-none px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-300 hover:text-white flex items-center justify-between">
            <span class="flex items-center gap-2">
              <span class="material-symbols-outlined text-base">settings</span>
              GitHub Connection
            </span>
            <span id="conn-status" class="text-[10px] text-slate-500"></span>
          </summary>
          <div class="px-5 pb-5 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Owner</label>
              <input id="gh-owner" type="text" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Repo</label>
              <input id="gh-repo" type="text" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Branch</label>
              <input id="gh-branch" type="text" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">
                Personal Access Token <span class="text-slate-500 normal-case font-normal">(needs <code>repo</code> or <code>contents:write</code> scope)</span>
              </label>
              <input id="gh-token" type="password" autocomplete="off" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" placeholder="ghp_…" />
            </div>
            <div class="md:col-span-2 flex items-center gap-2">
              <button id="btn-save-settings" class="text-xs font-bold uppercase tracking-wider px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition">Save Settings</button>
              <button id="btn-test-connection" class="text-xs font-bold uppercase tracking-wider px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition">Test Connection</button>
              <p class="text-[10px] text-slate-500 ml-auto">Stored in your browser only.</p>
            </div>
          </div>
        </details>

        <!-- Match Editor -->
        <div class="flex items-center justify-between">
          <h2 class="text-sm font-extrabold uppercase tracking-widest text-slate-300">Matches</h2>
          <button id="btn-add" class="text-xs font-bold uppercase tracking-wider px-4 py-2 rounded-xl bg-accent text-slate-900 hover:bg-accent/90 transition flex items-center gap-1.5">
            <span class="material-symbols-outlined text-base">add</span>
            Add Match
          </button>
        </div>

        <div id="match-list" class="space-y-3"></div>

        <p class="text-[11px] text-slate-500 text-center py-4">
          Changes here are saved to your browser as you type. Click <strong class="text-slate-300">Publish</strong> to commit <code>matches.js</code> to GitHub — your hosting will redeploy automatically.
        </p>
      </main>
    </section>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden toast opacity-0 translate-y-2">
      <div class="bg-slate-800 border border-slate-700 rounded-xl shadow-2xl px-5 py-3 text-sm font-bold flex items-center gap-2">
        <span id="toast-icon" class="material-symbols-outlined">check_circle</span>
        <span id="toast-text">OK</span>
      </div>
    </div>

    <!-- Match Row Template -->
    <template id="match-template">
      <div class="bg-surface border border-slate-700/50 rounded-2xl p-4" data-match-row>
        <div class="flex items-center justify-between mb-3">
          <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Match <span data-field="id-display"></span></span>
          <button data-action="delete" class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded bg-red-500/10 hover:bg-red-500/20 text-red-400 transition flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">delete</span>
            Remove
          </button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
          <div class="md:col-span-2">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">ID</label>
            <input data-field="id" type="number" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
          </div>
          <div class="md:col-span-6">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">League</label>
            <input data-field="league" type="text" list="leagues-list" autocomplete="off" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
          </div>
          <div class="md:col-span-2">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Time</label>
            <input data-field="time" type="text" list="times-list" autocomplete="off" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" placeholder="7:00 PM" />
          </div>
          <div class="md:col-span-2">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Day</label>
            <select data-field="day" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm">
              <option value="yesterday">yesterday</option>
              <option value="today">today</option>
              <option value="tomorrow">tomorrow</option>
            </select>
          </div>
          <div class="md:col-span-8">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Status</label>
            <input data-field="status" type="text" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" placeholder="It hasn't started yet." />
          </div>
          <div class="md:col-span-4 flex items-center gap-3 pt-5">
            <label class="inline-flex items-center gap-2 text-sm">
              <input data-field="isImportant" type="checkbox" class="rounded border-slate-700 bg-slate-900/80 text-primary focus:ring-primary" />
              <span class="text-xs font-bold uppercase tracking-wider text-slate-300">Featured</span>
            </label>
          </div>
          <div class="md:col-span-12">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Stream Link</label>
            <input data-field="link" type="url" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" placeholder="https://t.me" />
          </div>
          <div class="md:col-span-6">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Home Team Name</label>
            <input data-field="homeName" type="text" autocomplete="off" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
          </div>
          <div class="md:col-span-6">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Home Team Logo</label>
            <select data-field="homeLogo" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm"></select>
          </div>
          <div class="md:col-span-6">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Away Team Name</label>
            <input data-field="awayName" type="text" autocomplete="off" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
          </div>
          <div class="md:col-span-6">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Away Team Logo</label>
            <select data-field="awayLogo" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 text-sm"></select>
          </div>
          <datalist data-field="teams-list"></datalist>
        </div>
      </div>
    </template>

    <!-- Global datalists for league + time pickers -->
    <datalist id="leagues-list"></datalist>
    <datalist id="times-list"></datalist>

      const TIME_SLOTS = (() => {
        const out = [];
        for (let h = 0; h < 24; h++) {
          for (let m = 0; m < 60; m += 15) {
            const period = h < 12 ? 'AM' : 'PM';
            const hour12 = h % 12 === 0 ? 12 : h % 12;
            out.push(`${hour12}:${m.toString().padStart(2, '0')} ${period}`);
          }
        }
        return out;
      })();

      let matches = [];
      let baseSha = null;
      let dirty = false;

      const $ = (sel) => document.querySelector(sel);
      const $$ = (sel) => Array.from(document.querySelectorAll(sel));

      /* ── Toast ──────────────────────────────────────────────────── */
      function toast(message, kind = 'ok') {
        const el = $('#toast');
        const icon = $('#toast-icon');
        const txt = $('#toast-text');
        icon.textContent = kind === 'ok' ? 'check_circle' : kind === 'warn' ? 'warning' : 'error';
        icon.className = 'material-symbols-outlined ' + (kind === 'ok' ? 'text-emerald-400' : kind === 'warn' ? 'text-accent' : 'text-red-400');
        txt.textContent = message;
        el.classList.remove('hidden');
        requestAnimationFrame(() => {
          el.classList.remove('opacity-0', 'translate-y-2');
        });
        clearTimeout(toast._t);
        toast._t = setTimeout(() => {
          el.classList.add('opacity-0', 'translate-y-2');
          setTimeout(() => el.classList.add('hidden'), 250);
        }, 3000);
      }

      /* ── Auth ───────────────────────────────────────────────────── */
      async function sha256(text) {
        const buf = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, '0')).join('');
      }

      function showAdmin() {
        $('#auth-gate').classList.add('hidden');
        $('#admin-ui').classList.remove('hidden');
        boot();
      }

      $('#auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = $('#auth-password').value;
        const hash = await sha256(pw);
        if (hash === PASSWORD_HASH) {
          sessionStorage.setItem(STORAGE.auth, '1');
          $('#auth-error').classList.add('hidden');
          showAdmin();
        } else {
          $('#auth-error').classList.remove('hidden');
          $('#auth-password').value = '';
        }
      });

      if (sessionStorage.getItem(STORAGE.auth) === '1') showAdmin();

      $('#btn-logout').addEventListener('click', () => {
        sessionStorage.removeItem(STORAGE.auth);
        location.reload();

      /* ── GitHub settings persistence ────────────────────────────── */
      function loadSettings() {
        const raw = localStorage.getItem(STORAGE.gh);
        const saved = raw ? JSON.parse(raw) : {};
        const cfg = { ...DEFAULTS, ...saved };
        $('#gh-owner').value = cfg.owner;
        $('#gh-repo').value = cfg.repo;
        $('#gh-branch').value = cfg.branch;
        $('#gh-token').value = cfg.token;
        return cfg;
      }
      function readSettings() {
        return {
          owner: $('#gh-owner').value.trim(),
          repo: $('#gh-repo').value.trim(),
          branch: $('#gh-branch').value.trim() || 'main',
          token: $('#gh-token').value.trim()
        };
      }
      function saveSettings() {
        const cfg = readSettings();
        localStorage.setItem(STORAGE.gh, JSON.stringify(cfg));
        toast('Settings saved');
        return cfg;
      }
      $('#btn-save-settings').addEventListener('click', saveSettings);
      $('#btn-test-connection').addEventListener('click', testConnection);

      /* ── Dirty state ────────────────────────────────────────────── */
      function setDirty(v) {
        dirty = v;
        $('#dirty-indicator').classList.toggle('hidden', !v);
        if (v) localStorage.setItem(STORAGE.draft, JSON.stringify(matches));
        else localStorage.removeItem(STORAGE.draft);
      }
      window.addEventListener('beforeunload', (e) => {
        if (dirty) {
          e.preventDefault();
          e.returnValue = '';
        }
      });

      /* ── Datalist helpers ───────────────────────────────────────── */
      function fillDatalist(dl, items) {
        dl.innerHTML = '';
        items.forEach((v) => {
          const opt = document.createElement('option');
          opt.value = v;
          dl.appendChild(opt);
        });
      }
      function initGlobalDatalists() {
        fillDatalist(document.getElementById('leagues-list'), Object.keys(LEAGUES));
        fillDatalist(document.getElementById('times-list'), TIME_SLOTS);
      }
      function updateRowTeamsDatalist(node, league) {
        const dl = node.querySelector('[data-field="teams-list"]');
        const teams = LEAGUES[league] || [];
        fillDatalist(dl, teams);
      }

      /* ── Match list rendering ───────────────────────────────────── */
      function renderMatches() {
        const list = $('#match-list');
        list.innerHTML = '';
        const tpl = $('#match-template');
        matches.forEach((m, idx) => {
          const node = tpl.content.firstElementChild.cloneNode(true);
          node.querySelector('[data-field="id-display"]').textContent = m.id ?? idx + 1;
          node.querySelector('[data-field="id"]').value = m.id ?? '';
          node.querySelector('[data-field="league"]').value = m.league ?? '';
          node.querySelector('[data-field="time"]').value = m.time ?? '';
          node.querySelector('[data-field="day"]').value = m.day ?? 'today';
          node.querySelector('[data-field="status"]').value = m.status ?? '';
          node.querySelector('[data-field="isImportant"]').checked = !!m.isImportant;
          node.querySelector('[data-field="link"]').value = m.link ?? '';
          node.querySelector('[data-field="homeName"]').value = m.homeTeam?.name ?? '';
          node.querySelector('[data-field="awayName"]').value = m.awayTeam?.name ?? '';

          const homeSel = node.querySelector('[data-field="homeLogo"]');
          const awaySel = node.querySelector('[data-field="awayLogo"]');
          populateLogoSelect(homeSel, m.homeTeam?.logo);
          populateLogoSelect(awaySel, m.awayTeam?.logo);

          // Per-row teams datalist (filtered by league) — link home + away inputs to it.
          const teamsId = `teams-${idx}-${Date.now().toString(36)}`;
          const teamsDl = node.querySelector('[data-field="teams-list"]');
          teamsDl.id = teamsId;
          node.querySelector('[data-field="homeName"]').setAttribute('list', teamsId);
          node.querySelector('[data-field="awayName"]').setAttribute('list', teamsId);
          updateRowTeamsDatalist(node, m.league);

          node.querySelectorAll('input, select').forEach((input) => {
            input.addEventListener('input', () => syncRow(idx, node));
            input.addEventListener('change', () => syncRow(idx, node));
          });
          node.querySelector('[data-action="delete"]').addEventListener('click', () => {
            if (confirm('Delete this match?')) {
              matches.splice(idx, 1);
              setDirty(true);
              renderMatches();
            }
          });

          list.appendChild(node);
        });
      }

      function populateLogoSelect(select, current) {
        select.innerHTML = '';
        const seen = new Set();
        const all = [...LOGOS];
        if (current && !LOGOS.includes(current)) all.unshift(current);
        all.forEach((path) => {
          if (seen.has(path)) return;
          seen.add(path);
          const opt = document.createElement('option');
          opt.value = path;
          opt.textContent = path.replace('logos/', '').replace('.svg', '');
          if (path === current) opt.selected = true;
          select.appendChild(opt);
        });
      }

      function syncRow(idx, node) {
        const m = matches[idx];
        const prevLeague = m.league;
        const prevHomeName = m.homeTeam?.name;
        const prevAwayName = m.awayTeam?.name;

        m.id = Number(node.querySelector('[data-field="id"]').value) || 0;
        m.league = node.querySelector('[data-field="league"]').value;
        m.time = node.querySelector('[data-field="time"]').value;
        m.day = node.querySelector('[data-field="day"]').value;
        m.status = node.querySelector('[data-field="status"]').value;
        m.isImportant = node.querySelector('[data-field="isImportant"]').checked;
        m.link = node.querySelector('[data-field="link"]').value;
        m.homeTeam = {
          name: node.querySelector('[data-field="homeName"]').value,
          logo: node.querySelector('[data-field="homeLogo"]').value
        };
        m.awayTeam = {
          name: node.querySelector('[data-field="awayName"]').value,
          logo: node.querySelector('[data-field="awayLogo"]').value
        };
        node.querySelector('[data-field="id-display"]').textContent = m.id || idx + 1;

        // League changed → repopulate team suggestion list.
        if (m.league !== prevLeague) updateRowTeamsDatalist(node, m.league);

        // Team name picked from suggestions and matches a known logo → auto-fill.
        if (m.homeTeam.name !== prevHomeName && TEAM_LOGOS[m.homeTeam.name]) {
          m.homeTeam.logo = TEAM_LOGOS[m.homeTeam.name];
          populateLogoSelect(node.querySelector('[data-field="homeLogo"]'), m.homeTeam.logo);
        }
        if (m.awayTeam.name !== prevAwayName && TEAM_LOGOS[m.awayTeam.name]) {
          m.awayTeam.logo = TEAM_LOGOS[m.awayTeam.name];
          populateLogoSelect(node.querySelector('[data-field="awayLogo"]'), m.awayTeam.logo);
        }

        setDirty(true);
      }

      $('#btn-add').addEventListener('click', () => {
        const nextId = matches.reduce((max, m) => Math.max(max, Number(m.id) || 0), 0) + 1;
        matches.push({
          id: nextId,
          league: '',
          time: '',
          status: '',
          day: 'today',
          isImportant: false,
          link: 'https://t.me',
          homeTeam: { name: '', logo: LOGOS[0] },
          awayTeam: { name: '', logo: LOGOS[1] }
        });
        setDirty(true);
        renderMatches();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      });

      /* ── GitHub API ─────────────────────────────────────────────── */
      function ghHeaders(cfg) {
        const headers = { Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
        if (cfg.token) headers.Authorization = 'Bearer ' + cfg.token;
        return headers;
      }
      function ghContentsUrl(cfg) {
        return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/matches.js`;
      }

      async function fetchMatchesFromGitHub() {
        const cfg = readSettings();
        if (!cfg.owner || !cfg.repo) throw new Error('Owner/repo required');
        const url = `${ghContentsUrl(cfg)}?ref=${encodeURIComponent(cfg.branch)}`;
        const res = await fetch(url, { headers: ghHeaders(cfg) });
        if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status} ${res.statusText}`);
        const data = await res.json();
        baseSha = data.sha;
        const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
        return parseMatchesJs(content);
      }

      async function fetchLatestSha(cfg) {
        const url = `${ghContentsUrl(cfg)}?ref=${encodeURIComponent(cfg.branch)}`;
        const res = await fetch(url, { headers: ghHeaders(cfg), cache: 'no-store' });
        if (!res.ok) throw new Error(`Could not read current SHA: ${res.status} ${res.statusText}`);
        const data = await res.json();
        return data.sha;
      }

      async function publishToGitHub() {
        const cfg = saveSettings();
        if (!cfg.token) {
          toast('Add a GitHub token first', 'warn');
          return;
        }
        if (!validateMatches()) return;

        $('#btn-publish').disabled = true;
        $('#btn-publish').classList.add('opacity-60');
        try {
          // Always grab the latest SHA right before writing, so we never
          // collide with changes made outside this admin session.
          baseSha = await fetchLatestSha(cfg);

          const content = serializeMatchesJs(matches);
          const body = {
            message: `chore(matches): admin update (${matches.length} matches)`,
            content: btoa(unescape(encodeURIComponent(content))),
            branch: cfg.branch,
            sha: baseSha
          };
          const res = await fetch(ghContentsUrl(cfg), {
            method: 'PUT',
            headers: { ...ghHeaders(cfg), 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || `${res.status} ${res.statusText}`);
          }
          const data = await res.json();
          baseSha = data.content.sha;
          setDirty(false);
          toast('Published to GitHub');
        } catch (e) {
          console.error(e);
          toast('Publish failed: ' + e.message, 'err');
        } finally {
          $('#btn-publish').disabled = false;
          $('#btn-publish').classList.remove('opacity-60');
        }
      }

      async function testConnection() {
        const cfg = saveSettings();
        try {
          const url = `${ghContentsUrl(cfg)}?ref=${encodeURIComponent(cfg.branch)}`;
          const res = await fetch(url, { headers: ghHeaders(cfg) });
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          $('#conn-status').textContent = '✓ Connected';
          $('#conn-status').className = 'text-[10px] text-emerald-400';
          toast('Connection OK');
        } catch (e) {
          $('#conn-status').textContent = '✗ ' + e.message;
          $('#conn-status').className = 'text-[10px] text-red-400';
          toast('Connection failed', 'err');
        }
      }

      $('#btn-reload').addEventListener('click', async () => {
        if (dirty && !confirm('Discard unsaved changes and reload from GitHub?')) return;
        try {
          matches = await fetchMatchesFromGitHub();
          setDirty(false);
          renderMatches();
          toast('Reloaded from GitHub');
        } catch (e) {
          toast(e.message, 'err');
        }
      });

      $('#btn-publish').addEventListener('click', publishToGitHub);

      /* ── matches.js parser & serializer ─────────────────────────── */
      function parseMatchesJs(text) {
        // Extract the array literal and evaluate it safely via Function.
        const m = text.match(/const\s+MATCHES_DATA\s*=\s*(\[[\s\S]*?\]);?\s*$/m);
        if (!m) throw new Error('Could not parse matches.js — unexpected format');
        // eslint-disable-next-line no-new-func
        const arr = new Function('return ' + m[1])();
        if (!Array.isArray(arr)) throw new Error('matches.js did not produce an array');
        return arr;
      }

      function serializeMatchesJs(arr) {
        const lines = ['const MATCHES_DATA = ['];
        arr.forEach((m, i) => {
          lines.push('  {');
          lines.push(`    id: ${Number(m.id) || 0},`);
          lines.push(`    league: ${JSON.stringify(m.league || '')},`);
          lines.push(`    time: ${JSON.stringify(m.time || '')},`);
          lines.push(`    status: ${JSON.stringify(m.status || '')},`);
          lines.push(`    day: ${JSON.stringify(m.day || 'today')},`);
          lines.push(`    isImportant: ${!!m.isImportant},`);
          lines.push(`    link: ${JSON.stringify(m.link || '')},`);
          lines.push('    homeTeam: {');
          lines.push(`      name: ${JSON.stringify(m.homeTeam?.name || '')},`);
          lines.push(`      logo: ${JSON.stringify(m.homeTeam?.logo || '')}`);
          lines.push('    },');
          lines.push('    awayTeam: {');
          lines.push(`      name: ${JSON.stringify(m.awayTeam?.name || '')},`);
          lines.push(`      logo: ${JSON.stringify(m.awayTeam?.logo || '')}`);
          lines.push('    }');
          lines.push('  }' + (i === arr.length - 1 ? '' : ','));
        });
        lines.push('];');
        lines.push('');
        return lines.join('\n');
      }

      function validateMatches() {
        const ids = new Set();
        for (const m of matches) {
          if (!m.id) {
            toast('Every match needs an ID', 'err');
            return false;
          }
          if (ids.has(m.id)) {
            toast(`Duplicate ID: ${m.id}`, 'err');
            return false;
          }
          ids.add(m.id);
          if (!m.homeTeam?.name || !m.awayTeam?.name) {
            toast(`Match ${m.id}: both team names required`, 'err');
            return false;
          }
        }
        return true;
      }

      /* ── Boot ───────────────────────────────────────────────────── */
      async function boot() {
        loadSettings();
        initGlobalDatalists();
        const draft = localStorage.getItem(STORAGE.draft);
        if (draft) {
          try {
            matches = JSON.parse(draft);
            setDirty(true);
            renderMatches();
            toast('Restored unsaved draft', 'warn');
            // Still try to fetch baseSha in the background so publish works.
            fetchMatchesFromGitHub().catch(() => {});
            return;
          } catch (_) {
            localStorage.removeItem(STORAGE.draft);
          }
        }
        try {
          matches = await fetchMatchesFromGitHub();
          renderMatches();
        } catch (e) {
          // Fall back to local matches.js (page is served alongside it).
          try {
            const res = await fetch('matches.js', { cache: 'no-store' });
            const text = await res.text();
            matches = parseMatchesJs(text);
            renderMatches();
            toast('Loaded local matches.js (GitHub unreachable — add token to publish)', 'warn');
          } catch (e2) {
            toast('Could not load matches: ' + e2.message, 'err');
          }
        }
      }
